app:
  game: chess
  confidence_threshold: 0.55
  allow_low_confidence_override: false

camera:
  index: 0
  width: 1920
  height: 1080
  retries: 3
  retry_delay_sec: 0.2
  pre_capture_flush_frames: 4       # discard a few buffered frames before each capture
  pre_capture_flush_delay_sec: 0.0  # no intentional wait between flush grabs

vision:
  board_size: [8, 8]
  roi: [200, 100, 1400, 900]  # x, y, w, h in raw frame pixels
  auto_detect_board: true
  warp_square_px: 96
  outer_sheet_hsv_lower: [8, 20, 50]   # tune for your brown board sheet
  outer_sheet_hsv_upper: [35, 255, 255]
  outer_sheet_min_area_ratio: 0.1
  outer_sheet_max_area_to_chessboard_ratio: 3.5
  fallback_outer_margins_squares: [3.2, 3.2, 1.4, 2.4]  # left, right, top, bottom (in chess-square units)
  blur_kernel: 5
  diff_threshold: 28
  min_changed_squares: 2
  changed_square_pixel_ratio: 0.08

analysis:
  # Used by scripts/run_pi_software_bridge.py and scripts/run_turn_capture_analyze.py.
  # Lower diff_threshold/min_changed_ratio if slightly misaligned pieces are missed.
  label_mode: index
  inner_shrink: 0.02
  diff_threshold: 30
  min_changed_ratio: 0.20
  outer_candidate_mode: dark_only
  disable_tape_projection: false
  board_lock_source: before
  geometry_reference: configs/corners_info.json
  disable_geometry_reference: false
  # Camera image orientation for mapping detected grid cells into chess/checkers squares.
  # Assumes: top-left=a1, top-right=a8, bottom-right=h8, bottom-left=h1.
  camera_square_orientation: image_tl_a1_tr_a8_br_h8_bl_h1

classifier:
  enabled: false
  backend: yolo
  model_path: null  # e.g. models/chess_pieces_topdown.pt
  confidence_threshold: 0.35
  input_size: 640
  device: null  # e.g. cpu, cuda:0, mps

board:
  square_size_mm: 50.0
  origin_offset_mm: [0.0, 0.0]

motor:
  # Board endpoints from Software-GUI are game coordinates (a1=(0,0), h8=(7,7)).
  # The motor board origin is physically at the top-right camera corner, a8.
  board_orientation: game_a8_at_motor_00

comms:
  port: mock://stm32  # set to /dev/ttyACM0 (or similar) on Pi for real STM32 over USB
  baudrate: 115200
  timeout_sec: 0.35
  retries: 3

paths:
  calibration_file: configs/calibration.json
  logs_dir: logs
  debug_dir: debug_output

safety:
  auto_home_before_move: true
  fail_on_low_confidence: true
